<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activity</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f5f5f5;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    small {
      color: #666;
      font-weight: normal;
    }

    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 10px 5px 0 0;
      border: none;
      border-radius: 5px;
      background-color: #4caf50;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    pre {
      background-color: #272822;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h2>Activity</h2>

  
  <label for="userIdInput">ID <small>(for PUT, PATCH, DELETE only)</small>:</label>
  <input type="number" id="userIdInput" placeholder="Enter user ID" />

  <label for="nameInput">Name:</label>
  <input type="text" id="nameInput" placeholder="Enter name" />

  <label for="usernameInput">Username:</label>
  <input type="text" id="usernameInput" placeholder="Enter username" />

  <label for="emailInput">Email:</label>
  <input type="email" id="emailInput" placeholder="Enter email" />

  <label for="addressInput">Address (street):</label>
  <input type="text" id="addressInput" placeholder="Enter address" />

  <hr />

  
  <div>
    <button onclick="getData()">GET</button>
    <button onclick="postData()">POST</button>
    <button onclick="putData()">PUT</button>
    <button onclick="patchData()">PATCH</button>
    <button onclick="deleteData()">DELETE</button>
  </div>

  <pre id="output"></pre>

  <script src="postdata.js"></script>
</body>
</html>
