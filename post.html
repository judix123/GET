<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Activity</title>
</head>

<body>
  <div class="container">
    <div class="form-section">
      <h2>Activity</h2>

      <!-- Hidden at first -->
      <div id="idField" class="hidden">
        <label for="userIdInput">ID:</label>
        <input type="number" id="userIdInput" placeholder="Enter user ID" />
      </div>

      <label for="nameInput">Name:</label>
      <input type="text" id="nameInput" placeholder="Enter name" />

      <label for="usernameInput">Username:</label>
      <input type="text" id="usernameInput" placeholder="Enter username" />

      <label for="emailInput">Email:</label>
      <input type="email" id="emailInput" placeholder="Enter email" />

      <label for="addressInput">Address:</label>
      <input type="text" id="a  ddressInput" placeholder="Enter address" />

      <hr />

      <button onclick="getData()">GET</button>
      <button onclick="postData()">POST</button>
      <button onclick="putData()">PUT</button>
      <button onclick="patchData()">PATCH</button>
      <button onclick="deleteData()">DELETE</button>
    </div>

    <div class="output-section">
      <pre id="output"></pre>
    </div>
  </div>

  <script src="postdata.js"></script>
</body>
</html>
